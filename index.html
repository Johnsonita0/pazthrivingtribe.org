<script>
  (function() {
    // Check local storage for an existing preference on page boot
    var activePreference = localStorage.getItem('pazz_theme_preference') || 'light';
    
    window.switchClientTheme = function(chosenTheme) {
      var rootElement = document.documentElement;
      var bodyElement = document.body;
      
      localStorage.setItem('pazz_theme_preference', chosenTheme);

      if (chosenTheme === 'dark') {
        // ACTIVATE THE CLIENT'S NATIVE HOOKS
        rootElement.classList.add('dark', 'dark-mode');
        if (bodyElement) bodyElement.classList.add('dark', 'dark-mode');
        
        rootElement.setAttribute('data-theme', 'dark');
        if (bodyElement) bodyElement.setAttribute('data-theme', 'dark');
      } else {
        // STRIP THEM AWAY TO RESTORE YOUR ORIGINAL LIGHT THEME
        rootElement.classList.remove('dark', 'dark-mode');
        if (bodyElement) bodyElement.classList.remove('dark', 'dark-mode');
        
        rootElement.removeAttribute('data-theme');
        if (bodyElement) bodyElement.removeAttribute('data-theme');
      }
    };

    // Run immediately when the script evaluates to avoid flashing layouts
    window.switchClientTheme(activePreference);
  })();
</script>
  </body>
